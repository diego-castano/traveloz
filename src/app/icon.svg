<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="plane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#45D4C0"/>
      <stop offset="55%" stop-color="#6C2BD9"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!--
    Airplane top-down silhouette: nose at top, wings mid, tail-plane at bottom.
    Slight counter-clockwise tilt gives motion; no background box so this
    doesn't read as a generic "app tile".
  -->
  <g transform="rotate(-22 32 32)">
    <path
      d="M 32 3
         L 35.5 22
         L 60 32
         L 60 38
         L 35.5 34
         L 34.5 50
         L 42 56
         L 42 60
         L 32 57
         L 22 60
         L 22 56
         L 29.5 50
         L 28.5 34
         L 4 38
         L 4 32
         L 28.5 22 Z"
      fill="url(#plane)"
      stroke="rgba(17,17,36,0.22)"
      stroke-width="0.9"
      stroke-linejoin="round"
      stroke-linecap="round"
    />
    <!-- Fuselage highlight stripe for a bit of depth -->
    <path
      d="M 32 7 L 33.2 22 L 33.2 34 L 33 50 L 32 56"
      stroke="rgba(255,255,255,0.55)"
      stroke-width="1.2"
      stroke-linecap="round"
      fill="none"
    />
  </g>
</svg>
